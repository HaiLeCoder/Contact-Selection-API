spring:
  datasource:
    url: jdbc:mysql://localhost:3306/purchase_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: root
    password: Admin@123
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.example.contactselection.dto
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.example: DEBUG
    org.mybatis: DEBUG

# Swagger UI configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html          # URL: http://localhost:8080/api/swagger-ui.html
    try-it-out-enabled: true        # Bật "Try it out" button mặc định
    operations-sorter: method       # Sort by HTTP method
    display-request-duration: true  # Hiện thời gian response
  api-docs:
    path: /v3/api-docs              # URL: http://localhost:8080/api/v3/api-docs

